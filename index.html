<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <title>AI绘画提示词生成器</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <section class="landing-view">
      <div class="landing-hero">
        <p class="eyebrow">PROMPT BUILDER</p>
        <h1>AI 绘画提示词生成器</h1>
        <p class="landing-copy">把人物、发型、穿搭和风格快速组合成可直接继续润色的提示词。</p>
        <div class="landing-actions">
          <a class="primary-button landing-button landing-link" href="workspace.html">开始使用</a>
        </div>
      </div>

      <div class="landing-grid">

        </article>
        <article class="landing-card">
          <h2>高级可展开</h2>
          <p>每个大类都有自己的高级选项，不会挤在一起。</p>
        </article>
        <article class="landing-card">
          <h2>实时拼接</h2>
          <p>操作时同步生成重点信息和最终提示词。</p>
        </article>
      </div>
    </section>
  </div>
